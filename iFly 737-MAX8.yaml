master:
- get: L:VC_Throttle_1_V5_SW_VAL, Number
  set: "`${Math.min(100, Math.max(0, 100 - value))} (>L:VC_Throttle_1_trigger_VAL)`"
- get: L:VC_Throttle_2_V5_SW_VAL, Number
  set: "`${Math.min(100, Math.max(0, 100 - value))} (>L:VC_Throttle_2_trigger_VAL)`"
- get: A:ELEVATOR POSITION, Position 16k
  set: "`${value * -1} (>K:AXIS_ELEVATOR_SET)`"
- get: A:AILERON POSITION, Position 16k
  set: "`${value * -1} (>K:AXIS_AILERONS_SET)`"
- get: A:RUDDER POSITION, Position 16k
  set: "`${value * -1} (>K:AXIS_RUDDER_SET)`"
- get: A:BRAKE LEFT POSITION EX1, Position 32k
  set: "`${value - 16384} (>K:AXIS_LEFT_BRAKE_SET)`"
- get: A:BRAKE RIGHT POSITION EX1, Position 32k
  set: "`${value - 16384} (>K:AXIS_RIGHT_BRAKE_SET)`"
- get: A:RUDDER TRIM PCT, Position 16k
  set: (>K:RUDDER_TRIM_SET_EX1)
- get: A:ELEVATOR TRIM PCT, Position 16k
  set: (>K:ELEVATOR_TRIM_SET)
- get: A:AILERON TRIM PCT, Position 16k
  set: (>K:AILERON_TRIM_SET_EX1)

